name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main  # 修改为你想要触发部署的分支名

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Python 版本
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'  # 选择合适的Python版本
    - name: 下载依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build MkDocs site
      run: mkdocs build
    - name: Checkout GitHub Pages repository
      uses: actions/checkout@v3
      with:
        repository: wardenxyz/wardenxyz.github.io  # 替换为你的GitHub Pages仓库地址
        token: ${{ secrets.GH_PAGES_ACCESS_TOKEN }}  # 使用自定义的Personal Access Token
        ref: main  # 或者其他分支名，如：gh-pages
        path: gh-pages-repo
    - name: Copy built site to GitHub Pages repository
      run: |
        cp -R site/* gh-pages-repo/
    - name: Commit and push changes
      working-directory: gh-pages-repo
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Deploy MkDocs site from $(date +'%Y-%m-%d %H:%M:%S')"
        git push origin main