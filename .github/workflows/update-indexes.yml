name: 更新博客索引

on:
  push:
    branches:
      - main
    # paths:
    #   - 'posts/**'

jobs:
  update-indexes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Python 准备
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-frontmatter

      - name: 运行 Python 脚本
        run: python .github/scripts/update_indexes.py

      - name: 提交索引
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md tags.md categories.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update blog indexes at $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"

      - name: 推送索引
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main